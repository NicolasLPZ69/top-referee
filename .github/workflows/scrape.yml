name: Top Referee — Scrape Ligue 1

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python topreferee_scraper.py

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: ligue1-arbitrage
          path: '*.csv'
          if-no-files-found: error
          retention-days: 30
